[pytest]
# Default scope: new-style tests under test/unit and test/integration.
# Legacy tests under test/test_*.py mock cv2/face_recognition at import
# time and pollute sys.modules — keep them opt-in via 'pytest test/test_*.py'
# until they're rewritten in Phase 5.
testpaths = test/unit test/integration
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    unit: marks tests as unit tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning